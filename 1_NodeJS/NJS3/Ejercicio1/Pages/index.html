<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 1 - Manipulación DOM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/Styles/style.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card shadow border-0 rounded-4 p-5 text-center">
            <h1 id="mainTitle" class="display-4 mb-4">Hola DOM</h1>
            
            <div id="imageContainer" class="mb-4">
            </div>

            <div class="d-flex flex-wrap justify-content-center gap-3">
                <button id="btnToggleText" class="btn btn-primary shadow-sm">Cambiar Texto</button>
                <button id="btnToggleColor" class="btn btn-success shadow-sm">Cambiar Color</button>
                <button id="btnAddImage" class="btn btn-warning shadow-sm">Agregar Imagen</button>
                <button id="btnToggleImage" class="btn btn-secondary shadow-sm" disabled>Cambiar Imagen</button>
                <button id="btnToggleSize" class="btn btn-info shadow-sm text-white" disabled>Cambiar Tamaño</button>
            </div>
        </div>
    </div>
    <script type="module" src="/Scripts/main.js"></script>
</body>
</html>
