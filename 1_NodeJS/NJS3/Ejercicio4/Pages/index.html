<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 4 - Creador y Modificador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/Styles/style.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card shadow border-0 rounded-4 p-4">
            <h2 class="text-center text-dark mb-4">Generador Dinámico de Elementos</h2>
            
            <div class="row g-3 mb-4">
                <!-- Fila 1: Enlace -->
                <div class="col-md-6 d-flex gap-2">
                    <button id="btnCreateA" class="btn btn-primary w-50">Crear Enlace (a)</button>
                    <button id="btnModifyA" class="btn btn-outline-primary w-50" disabled>Cambiar HREF</button>
                </div>
                <!-- Fila 2: Div -->
                <div class="col-md-6 d-flex gap-2">
                    <button id="btnCreateDiv" class="btn btn-success w-50">Crear Div</button>
                    <button id="btnModifyDiv" class="btn btn-outline-success w-50" disabled>Cambiar Color (Class)</button>
                </div>
                <!-- Fila 3: Párrafo -->
                <div class="col-md-6 d-flex gap-2">
                    <button id="btnCreateP" class="btn btn-info text-white w-50">Crear Párrafo (p)</button>
                    <button id="btnModifyP" class="btn btn-outline-info w-50" disabled>Cambiar Título (Title)</button>
                </div>
                <!-- Fila 4: Imagen -->
                <div class="col-md-6 d-flex gap-2">
                    <button id="btnCreateImg" class="btn btn-warning w-50">Crear Imagen (img)</button>
                    <button id="btnModifyImg" class="btn btn-outline-warning w-50" disabled>Cambiar Fuente (Src)</button>
                </div>
                <!-- Fila 5: Botón -->
                <div class="col-md-6 d-flex gap-2">
                    <button id="btnCreateBtn" class="btn btn-danger w-50">Crear Botón</button>
                    <button id="btnModifyBtn" class="btn btn-outline-danger w-50" disabled>Deshabilitar (Disabled)</button>
                </div>
            </div>

            <div id="elementsContainer" class="border rounded-3 p-4 bg-white mb-4 d-flex flex-wrap gap-3 align-items-center justify-content-center" style="min-height: 200px;">
                <!-- Aquí aparecerán los elementos creados -->
            </div>

            <div id="logContainer" class="bg-dark text-success p-3 rounded-3 font-monospace" style="height: 150px; overflow-y: auto;">
                <div>> Sistema listo para crear...</div>
            </div>
        </div>
    </div>
    <script type="module" src="/Scripts/main.js"></script>
</body>
</html>
