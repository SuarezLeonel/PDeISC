<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 6 - Registro Dinámico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/Styles/style.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card shadow border-0 rounded-4 p-4 mb-4">
                    <h2 class="text-center text-primary mb-4">Formulario de Registro</h2>
                    <form id="registrationForm" class="needs-validation" novalidate>
                        <!-- Text -->
                        <div class="mb-3">
                            <label for="fullName" class="form-label">Nombre Completo</label>
                            <input type="text" class="form-control" id="fullName" required minlength="3">
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label for="userEmail" class="form-label">Correo Electrónico</label>
                            <input type="email" class="form-control" id="userEmail" required>
                        </div>

                        <!-- Number -->
                        <div class="mb-3">
                            <label for="userAge" class="form-label">Edad</label>
                            <input type="number" class="form-control" id="userAge" required min="18" max="100">
                        </div>

                        <!-- Select -->
                        <div class="mb-3">
                            <label for="userCountry" class="form-label">País de Residencia</label>
                            <select class="form-select" id="userCountry" required>
                                <option value="" selected disabled>Seleccione un país...</option>
                                <option value="Argentina">Argentina</option>
                                <option value="Brasil">Brasil</option>
                                <option value="Uruguay">Uruguay</option>
                                <option value="Chile">Chile</option>
                            </select>
                        </div>

                        <!-- Radio -->
                        <div class="mb-3">
                            <label class="form-label d-block">Género</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="gender" id="genderM" value="Masculino" required>
                                <label class="form-check-label" for="genderM">Masculino</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="gender" id="genderF" value="Femenino">
                                <label class="form-check-label" for="genderF">Femenino</label>
                            </div>
                        </div>

                        <!-- Checkbox -->
                        <div class="mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="terms" required>
                                <label class="form-check-label" for="terms">Acepto los términos y condiciones</label>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2">Registrar Ahora</button>
                    </form>
                </div>
            </div>

            <!-- Resultado Dinámico -->
            <div id="resultContainer" class="col-lg-5 d-none">
                <div class="card shadow-lg border-0 rounded-4 p-4 bg-primary text-white sticky-top" style="top: 2rem;">
                    <h3 class="mb-4 border-bottom pb-2">Datos Confirmados</h3>
                    <div id="userDataDisplay">
                        <!-- Los datos se inyectarán aquí -->
                    </div>
                    <button id="btnReset" class="btn btn-light mt-4 w-100">Nuevo Registro</button>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="/Scripts/main.js"></script>
</body>
</html>
