<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 5 - Portal de Noticias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/Styles/style.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card shadow border-0 rounded-4 p-4 text-center">
            <h2 class="text-primary mb-4">Portal de Noticias Dinámico</h2>
            
            <!-- Controles de Generación -->
            <div class="d-flex justify-content-center flex-wrap gap-3 mb-4">
                <button id="btnFootball" class="btn btn-success shadow-sm">Noticias Fútbol</button>
                <button id="btnTech" class="btn btn-primary shadow-sm">Noticias Tech</button>
            </div>

            <!-- Controles de Limpieza -->
            <div class="d-flex justify-content-center flex-wrap gap-2 mb-5">
                <button id="btnClearFootball" class="btn btn-outline-success btn-sm">Limpiar Fútbol</button>
                <button id="btnClearTech" class="btn btn-outline-primary btn-sm">Limpiar Tech</button>
                <button id="btnClearAll" class="btn btn-danger btn-sm">Limpiar Todo</button>
            </div>

            <div id="contentGrid" class="row g-4">
                <!-- El contenido masivo se inyectará aquí -->
            </div>
        </div>
    </div>
    <script type="module" src="/Scripts/main.js"></script>
</body>
</html>
