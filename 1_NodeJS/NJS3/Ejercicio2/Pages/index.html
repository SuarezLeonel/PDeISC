<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 2 - Eventos DHTML</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/Styles/style.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h2 class="text-center text-dark mb-5 fw-bold">Panel de Eventos Interactivos</h2>
        
        <div class="row g-4">
            <!-- Evento 1: CLICK -->
            <div class="col-md-4">
                <div class="card h-100 shadow-sm border-0 p-3 text-center event-card">
                    <h5 class="card-title text-primary">1. Click</h5>
                    <button id="btnClick" class="btn btn-primary w-100 mb-2">Presionar</button>
                    <div id="logClick" class="event-log small text-muted">Esperando acción...</div>
                </div>
            </div>

            <!-- Evento 2: MOUSEOVER -->
            <div class="col-md-4">
                <div id="cardHover" class="card h-100 shadow-sm border-0 p-3 text-center event-card">
                    <h5 class="card-title text-success">2. Mouse Over</h5>
                    <div class="p-4 border rounded bg-light">Pasa el mouse aquí</div>
                    <div id="logHover" class="event-log small text-muted mt-2">Estado: Normal</div>
                </div>
            </div>

            <!-- Evento 3: FOCUS -->
            <div class="col-md-4">
                <div class="card h-100 shadow-sm border-0 p-3 text-center event-card">
                    <h5 class="card-title text-danger">3. Focus / Blur</h5>
                    <input type="text" id="inputFocus" class="form-control" placeholder="Escribe aquí...">
                    <div id="logFocus" class="event-log small text-muted mt-2">Estado: Fuera de foco</div>
                </div>
            </div>

            <!-- Evento 4: DOUBLE CLICK -->
            <div class="col-md-6">
                <div id="boxDblClick" class="card h-100 shadow-sm border-0 p-4 text-center event-card bg-info text-white" style="cursor: pointer;">
                    <h5 class="card-title">4. Double Click</h5>
                    <p class="mb-0">¡Haz doble click para cambiar mi color!</p>
                </div>
            </div>

            <!-- Evento 5: KEYDOWN -->
            <div class="col-md-6">
                <div class="card h-100 shadow-sm border-0 p-3 text-center event-card">
                    <h5 class="card-title text-warning">5. Key Down</h5>
                    <input type="text" id="inputKey" class="form-control" placeholder="Presiona teclas...">
                    <div id="logKey" class="event-log mt-2 fw-bold text-dark">Última tecla: Ninguna</div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="/Scripts/main.js"></script>
</body>
</html>
