<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 10 - .map()</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .card { border-radius: 1rem; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 2rem; }
        .display-area { background: #fff; padding: 1.2rem; border-radius: 0.8rem; border: 1px solid #e2e8f0; font-family: monospace; color: #7c3aed; }
        .section-title { font-weight: 700; color: #1e293b; border-left: 4px solid #7c3aed; padding-left: 0.8rem; }
        @media (max-width: 576px) {
            .display-area { padding: 0.8rem; font-size: 0.9rem; }
            .card { padding: 1.2rem !important; }
            h1 { font-size: 1.75rem; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body class="py-5">
    <div class="container">
        <h1 class="text-center mb-5 fw-bold">Transformación: .map()</h1>

        <div class="card p-4">
            <h5 class="section-title">1. Multiplicar por 3</h5>
            <div id="nums-display" class="display-area mb-3">Números: [1, 2, 3, 4]</div>
            <button id="btn-nums" class="btn btn-primary" style="background-color: #7c3aed; border: none;">Ejecutar x3</button>
            <div id="res-nums" class="mt-2 fw-bold text-success"></div>
        </div>

        <div class="card p-4">
            <h5 class="section-title">2. Nombres a Mayúsculas</h5>
            <div id="names-display" class="display-area mb-3">Nombres: ["ana", "luis", "pepe"]</div>
            <button id="btn-names" class="btn btn-dark">Convertir</button>
            <div id="res-names" class="mt-2 fw-bold text-success"></div>
        </div>

        <div class="card p-4">
            <h5 class="section-title">3. Precios + IVA (21%)</h5>
            <div id="prices-display" class="display-area mb-3">Precios: [100, 250, 500]</div>
            <button id="btn-prices" class="btn btn-outline-primary">Calcular IVA</button>
            <div id="res-prices" class="mt-2 fw-bold text-success"></div>
        </div>
    </div>
    <script type="module" src="../Scripts/main.js"></script>
</body>
</html>
