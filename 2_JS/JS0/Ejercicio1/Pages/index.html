<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 1 - .push()</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f0f2f5; }
        .card { border-radius: 1.5rem; border: none; box-shadow: 0 1rem 3rem rgba(0,0,0,0.1); margin-bottom: 2rem; }
        .display-area { background: #ffffff; padding: 1.5rem; border-radius: 1rem; border: 1px solid #e0e4e9; font-family: 'JetBrains Mono', monospace; min-height: 60px; color: #1a73e8; }
        .section-title { font-weight: 800; color: #1a202c; border-left: 5px solid #1a73e8; padding-left: 1rem; margin-bottom: 1.5rem; }
        @media (max-width: 576px) {
            .display-area { padding: 1rem; font-size: 0.9rem; }
            .card { padding: 1.5rem !important; }
            h1 { font-size: 1.75rem; }
        }
    </style>
</head>
<body class="py-5">
    <div class="container">
        <h1 class="text-center mb-5 fw-bold text-dark px-3">Laboratorio de Arrays: .push()</h1>

        <div class="row justify-content-center px-2">
            <!-- Parte 1: Frutas -->
            <div class="col-12 col-lg-10 col-xl-8">
                <div class="card p-4">
                    <h4 class="section-title">1. Agregar Frutas</h4>
                    <div id="frutas-display" class="display-area mb-3 text-break">Array: []</div>
                    <div class="input-group mb-3 flex-column flex-md-row">
                        <input type="text" id="fruta-input" class="form-control mb-2 mb-md-0" placeholder="Nombre de la fruta...">
                        <button id="btn-frutas" class="btn btn-primary fw-bold ms-md-2">Agregar Fruta</button>
                    </div>
                    <div id="frutas-count" class="small text-muted">Frutas agregadas: 0/3</div>
                </div>
            </div>

            <!-- Parte 2: Amigos -->
            <div class="col-12 col-lg-10 col-xl-8">
                <div class="card p-4">
                    <h4 class="section-title">2. Mis Amigos</h4>
                    <div id="amigos-display" class="display-area mb-3 text-break">Amigos iniciales: ["Juan"]</div>
                    <div class="input-group mb-3 flex-column flex-md-row">
                        <input type="text" id="amigo-input" class="form-control mb-2 mb-md-0" placeholder="Nombre del amigo...">
                        <button id="btn-amigos" class="btn btn-success fw-bold ms-md-2">Agregar Amigo</button>
                    </div>
                    <div id="amigos-count" class="small text-muted">Amigos agregados: 0/3</div>
                </div>
            </div>

            <!-- Parte 3: Números condicionales -->
            <div class="col-12 col-lg-10 col-xl-8">
                <div class="card p-4">
                    <h4 class="section-title">3. Agregar si es mayor al último</h4>
                    <div id="nums-display" class="display-area mb-3 text-break">Números: [10, 20, 30]</div>
                    <div class="input-group mb-3 flex-column flex-md-row">
                        <input type="number" id="num-input" class="form-control mb-2 mb-md-0" placeholder="Ingresa un número">
                        <button id="btn-nums" class="btn btn-warning fw-bold ms-md-2">Intentar Agregar</button>
                    </div>
                    <div id="msg-nums" class="mt-2 fw-bold"></div>
                </div>
            </div>

            <div class="col-12 text-center">
                <button id="btn-toggle" class="btn btn-outline-secondary px-4">Mostrar/Ocultar Todo</button>
            </div>
        </div>
    </div>
    <script type="module" src="../Scripts/main.js"></script>
</body>
</html>
