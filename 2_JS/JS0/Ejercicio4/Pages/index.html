<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 4 - .shift()</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8f9fa; }
        .card { border-radius: 1rem; border: none; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 1.5rem; }
        .display-area { background: #fff; padding: 1rem; border-radius: 0.8rem; border: 1px solid #dee2e6; font-family: monospace; color: #fd7e14; }
        .section-title { font-weight: 700; color: #495057; border-left: 4px solid #fd7e14; padding-left: 0.8rem; }
        @media (max-width: 576px) {
            .display-area { padding: 0.8rem; font-size: 0.9rem; }
            .card { padding: 1.2rem !important; }
            h1 { font-size: 1.75rem; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body class="py-5">
    <div class="container">
        <h1 class="text-center mb-5 fw-bold">Salida de Datos: .shift()</h1>

        <div class="card p-4">
            <h5 class="section-title">1. Eliminar primer elemento</h5>
            <div id="enteros-display" class="display-area mb-3">Enteros: [1, 2, 3, 4, 5]</div>
            <button id="btn-enteros" class="btn btn-outline-danger">quitar el primer elemento</button>
        </div>

        <div class="card p-4">
            <h5 class="section-title">2. Mensajes de Chat</h5>
            <div id="chat-display" class="display-area mb-3">Chat: ["Hola", "¿Cómo estás?", "Todo bien"]</div>
            <button id="btn-chat" class="btn btn-warning">Eliminar mensaje más antiguo</button>
            <div id="msg-chat" class="mt-2 small"></div>
        </div>

        <div class="card p-4">
            <h5 class="section-title">3. Cola de Atención</h5>
            <div id="cola-display" class="display-area mb-3">En espera: ["Carlos", "Marta", "Luis"]</div>
            <button id="btn-atender" class="btn btn-dark">Atender cliente (Shift)</button>
            <div id="msg-atender" class="mt-2 fw-bold text-success"></div>
        </div>
    </div>
    <script type="module" src="../Scripts/main.js"></script>
</body>
</html>
