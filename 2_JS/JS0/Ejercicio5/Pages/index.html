<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 5 - .splice()</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f0f2f5; }
        .card { border-radius: 1.2rem; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.06); margin-bottom: 2rem; }
        .display-area { background: #fff; padding: 1rem; border-radius: 0.8rem; border: 1px solid #e0e6ed; font-family: monospace; color: #0d6efd; }
        .section-title { font-weight: 700; color: #334155; border-left: 4px solid #0d6efd; padding-left: 0.8rem; }
        @media (max-width: 576px) {
            .display-area { padding: 0.8rem; font-size: 0.9rem; }
            .card { padding: 1.2rem !important; }
            h1 { font-size: 1.75rem; }
            .input-group { flex-direction: column; }
            .input-group > .form-control { width: 100%; border-radius: 0.5rem !important; margin-bottom: 0.5rem; }
            .input-group > .btn { width: 100%; border-radius: 0.5rem !important; }
        }
    </style>
</head>
<body class="py-5">
    <div class="container">
        <h1 class="text-center mb-5 fw-bold">Modificación Quirúrgica: .splice()</h1>

        <div class="card p-4">
            <h5 class="section-title">1. Eliminar 2 desde posición 1</h5>
            <div id="letras-display" class="display-area mb-3">Letras: ["A", "B", "C", "D", "E"]</div>
            <button id="btn-letras" class="btn btn-danger">Eliminar "B" y "C"</button>
        </div>

        <div class="card p-4">
            <h5 class="section-title">2. Insertar Nombre en 2da posición</h5>
            <div id="nombres-display" class="display-area mb-3">Nombres: ["Ana", "Pepe"]</div>
            <div class="input-group">
                <input type="text" id="nombre-input" class="form-control" placeholder="Nombre a insertar...">
                <button id="btn-nombre" class="btn btn-success">Insertar en medio</button>
            </div>
        </div>

        <div class="card p-4">
            <h5 class="section-title">3. Reemplazar 2 Elementos</h5>
            <div id="reemplazo-display" class="display-area mb-3">Elementos: ["X", "Y", "Z", "W"]</div>
            <div class="row g-2">
                <div class="col-4"><input type="number" id="pos-input" class="form-control" placeholder="Posición"></div>
                <div class="col-4"><input type="text" id="n1-input" class="form-control" placeholder="Nuevo 1"></div>
                <div class="col-4"><input type="text" id="n2-input" class="form-control" placeholder="Nuevo 2"></div>
            </div>
            <button id="btn-reemplazo" class="btn btn-primary mt-3 w-100">Reemplazar ahora</button>
        </div>
    </div>
    <script type="module" src="../Scripts/main.js"></script>
</body>
</html>
