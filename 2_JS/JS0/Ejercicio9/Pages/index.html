<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 9 - .forEach()</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f3f4f6; }
        .card { border-radius: 1rem; border: none; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 2rem; }
        .display-area { background: #fff; padding: 1.2rem; border-radius: 0.8rem; border: 1px solid #e5e7eb; font-family: monospace; color: #4b5563; }
        .section-title { font-weight: 700; color: #111827; border-left: 4px solid #3b82f6; padding-left: 0.8rem; }
        .list-group-item { border: none; padding: 0.5rem 0; background: transparent; }
        @media (max-width: 576px) {
            .display-area { padding: 0.8rem; font-size: 0.9rem; }
            .card { padding: 1.2rem !important; }
            h1 { font-size: 1.75rem; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body class="py-5">
    <div class="container">
        <h1 class="text-center mb-5 fw-bold">Iteración de Elementos: .forEach()</h1>

        <div class="card p-4">
            <h5 class="section-title">1. Saludo a Nombres</h5>
            <div id="names-display" class="display-area mb-3">Nombres: ["Ana", "Luis", "Pepe"]</div>
            <button id="btn-names" class="btn btn-primary">Mostrar Saludos</button>
            <div id="res-names" class="mt-2 text-primary"></div>
        </div>

        <div class="card p-4">
            <h5 class="section-title">2. Doble de los Números</h5>
            <div id="nums-display" class="display-area mb-3">Números: [1, 5, 10, 20]</div>
            <button id="btn-nums" class="btn btn-success">Imprimir Dobles</button>
            <div id="res-nums" class="mt-2 text-success"></div>
        </div>

        <div class="card p-4">
            <h5 class="section-title">3. Usuarios (Nombre y Edad)</h5>
            <div id="users-display" class="display-area mb-3">Cargando usuarios...</div>
            <button id="btn-users" class="btn btn-dark">Mostrar Detalles</button>
            <ul id="res-users" class="list-group mt-3"></ul>
        </div>
    </div>
    <script type="module" src="../Scripts/main.js"></script>
</body>
</html>
