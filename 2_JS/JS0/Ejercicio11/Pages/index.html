<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 11 - .filter()</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        .card { border-radius: 1rem; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 2rem; }
        .display-area { background: #fff; padding: 1.2rem; border-radius: 0.8rem; border: 1px solid #e2e8f0; font-family: monospace; color: #10b981; }
        .section-title { font-weight: 700; color: #1e293b; border-left: 4px solid #10b981; padding-left: 0.8rem; }
        @media (max-width: 576px) {
            .display-area { padding: 0.8rem; font-size: 0.9rem; }
            .card { padding: 1.2rem !important; }
            h1 { font-size: 1.75rem; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body class="py-5">
    <div class="container">
        <h1 class="text-center mb-5 fw-bold">Filtrado de Datos: .filter()</h1>

        <div class="card p-4">
            <h5 class="section-title">1. Números > 10</h5>
            <div id="nums-display" class="display-area mb-3">Números: [5, 12, 8, 130, 44, 2, 19]</div>
            <button id="btn-nums" class="btn btn-success">Filtrar Mayores a 10</button>
            <div id="res-nums" class="mt-2 fw-bold"></div>
        </div>

        <div class="card p-4">
            <h5 class="section-title">2. Palabras > 5 letras</h5>
            <div id="words-display" class="display-area mb-3">Palabras: ["sol", "computadora", "mar", "estrella", "casa"]</div>
            <button id="btn-words" class="btn btn-dark">Filtrar Palabras Largas</button>
            <div id="res-words" class="mt-2 fw-bold"></div>
        </div>

        <div class="card p-4">
            <h5 class="section-title">3. Usuarios Activos</h5>
            <div id="users-display" class="display-area mb-3">Cargando usuarios...</div>
            <button id="btn-users" class="btn btn-outline-success">Mostrar solo activos</button>
            <div id="res-users" class="mt-2 fw-bold"></div>
        </div>
    </div>
    <script type="module" src="../Scripts/main.js"></script>
</body>
</html>
